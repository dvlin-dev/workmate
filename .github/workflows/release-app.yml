name: Release App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to re-run (for example v0.1.0)
        required: true
        type: string

concurrency:
  group: release-app-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9.12.2

jobs:
  metadata:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      tag_sha: ${{ steps.meta.outputs.tag_sha }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            if [[ -z "${TAG}" ]]; then
              echo "workflow_dispatch requires inputs.tag" >&2
              exit 1
            fi

            if ! git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
              echo "Requested tag ${TAG} does not exist." >&2
              exit 1
            fi

            VERSION="$(
              git show "${TAG}:app/package.json" \
                | node -e "let raw='';process.stdin.setEncoding('utf8');process.stdin.on('data',(chunk)=>raw+=chunk);process.stdin.on('end',()=>process.stdout.write(JSON.parse(raw).version));"
            )"
          else
            VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('app/package.json', 'utf8')).version")"
            TAG="v${VERSION}"
          fi

          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported release version: ${VERSION}. Only x.y.z format is allowed." >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" != "${TAG}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match app/package.json version ${VERSION}." >&2
            exit 1
          fi

          TAG_SHA="$(git rev-list -n 1 "${TAG}")"
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${TAG_SHA}" != "${GITHUB_SHA}" ]]; then
            echo "Tag ${TAG} already points to ${TAG_SHA}, but workflow is running for ${GITHUB_SHA}." >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${TAG_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build-macos-arm64:
    name: Build macOS arm64
    needs: metadata
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Prepare Apple notarization key
        shell: bash
        run: |
          set -euo pipefail
          KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          if [[ "${APPLE_API_KEY_CONTENT}" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s\n' "${APPLE_API_KEY_CONTENT}" > "${KEY_PATH}"
          else
            APPLE_API_KEY_CONTENT="${APPLE_API_KEY_CONTENT}" python3 -c 'import base64, os, sys; sys.stdout.buffer.write(base64.b64decode(os.environ["APPLE_API_KEY_CONTENT"]))' > "${KEY_PATH}"
          fi
          chmod 600 "${KEY_PATH}"
          echo "APPLE_API_KEY=${KEY_PATH}" >> "${GITHUB_ENV}"
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run dist:mac:arm64
      - run: pnpm run smoke:packaged
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: app/release/${{ needs.metadata.outputs.version }}/*
          if-no-files-found: error

  build-macos-x64:
    name: Build macOS x64
    needs: metadata
    runs-on: macos-15-intel
    defaults:
      run:
        working-directory: app
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Prepare Apple notarization key
        shell: bash
        run: |
          set -euo pipefail
          KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          if [[ "${APPLE_API_KEY_CONTENT}" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s\n' "${APPLE_API_KEY_CONTENT}" > "${KEY_PATH}"
          else
            APPLE_API_KEY_CONTENT="${APPLE_API_KEY_CONTENT}" python3 -c 'import base64, os, sys; sys.stdout.buffer.write(base64.b64decode(os.environ["APPLE_API_KEY_CONTENT"]))' > "${KEY_PATH}"
          fi
          chmod 600 "${KEY_PATH}"
          echo "APPLE_API_KEY=${KEY_PATH}" >> "${GITHUB_ENV}"
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run dist:mac:x64
      - run: pnpm run smoke:packaged
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-x64
          path: app/release/${{ needs.metadata.outputs.version }}/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - metadata
      - build-macos-arm64
      - build-macos-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          path: .artifacts
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${{ needs.metadata.outputs.tag }}" \
            -f target_commitish="${{ needs.metadata.outputs.tag_sha }}" \
            --jq '.body' > .release-notes.md
      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .release-assets
          for arch in darwin-arm64 darwin-x64; do
            find ".artifacts/${arch}" -maxdepth 1 -type f \( \
              -name '*.dmg' -o \
              -name '*.zip' -o \
              -name '*.blockmap' \
            \) -exec cp {} .release-assets/ \;
          done

          echo "Release assets:"
          ls -lh .release-assets/
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.metadata.outputs.tag }}"
          TITLE="Workmate ${{ needs.metadata.outputs.version }}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" .release-assets/* --clobber
            gh release edit "${TAG}" --title "${TITLE}" --notes-file .release-notes.md
          else
            gh release create "${TAG}" .release-assets/* \
              --title "${TITLE}" \
              --notes-file .release-notes.md \
              --verify-tag
          fi
